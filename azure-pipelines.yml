trigger:
  - main

pool:
  vmImage: 'windows-latest'

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build Job'
    steps:
    - task: PowerShell@2
      displayName: 'Create Web Package'
      inputs:
        targetType: 'inline'
        script: |
          New-Item -ItemType Directory -Path "$(Build.ArtifactStagingDirectory)\web" -Force
          Copy-Item -Path "$(Build.SourcesDirectory)\*.html" -Destination "$(Build.ArtifactStagingDirectory)\web\" -Force
          Write-Host "Build package created"
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifacts'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'drop'
        publishLocation: 'Container'

- stage: DeployDev
  displayName: 'Deploy to DEV'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployDev
    displayName: 'Deploy to DEV Environment'
    environment: 'DEV'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo Deploying to DEV
            displayName: 'DEV Deployment'

- stage: DeployStaging
  displayName: 'Deploy to STAGING'
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - deployment: DeployStaging
    displayName: 'Deploy to STAGING Environment'
    environment: 'STAGING'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo Deploying to STAGING
            displayName: 'STAGING Deployment'

- stage: DeployProduction
  displayName: 'Deploy to PRODUCTION'
  dependsOn: DeployStaging
  condition: succeeded()
  jobs:
  - deployment: DeployProduction
    displayName: 'Deploy to PRODUCTION Environment'
    environment: 'PRODUCTION'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo Deploying to PRODUCTION
            displayName: 'PRODUCTION Deployment'
